<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
  <defs>
    <!-- Primary neon gradient: Deep Purple → Vivid Violet → Cyan -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>

    <!-- Line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:0.25" />
      <stop offset="60%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0.9" />
    </linearGradient>

    <!-- MAP text gradient -->
    <linearGradient id="mapTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>

    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Connection Lines -->
  <line x1="18" y1="62" x2="32" y2="62" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="32" y1="62" x2="50" y2="38" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="50" y1="38" x2="70" y2="56" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="70" y1="56" x2="90" y2="32" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" />

  <!-- Progress Nodes -->
  <circle cx="18" cy="62" r="5" fill="#4C1D95" opacity="0.5" />
  <circle cx="32" cy="62" r="5.5" fill="#6D28D9" opacity="0.65" />
  <circle cx="50" cy="38" r="6" fill="#7C3AED" opacity="0.8" />
  <circle cx="70" cy="56" r="6.5" fill="#8B5CF6" opacity="0.9" />

  <!-- Active Node (Destination) -->
  <circle cx="90" cy="32" r="9" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.4" />
  <circle cx="90" cy="32" r="7.5" fill="#22D3EE" filter="url(#neonGlow)" />
  <circle cx="90" cy="32" r="3" fill="#FFFFFF" />

  <!-- Pulse Ring -->
  <circle cx="90" cy="32" r="13" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.3">
    <animate attributeName="r" values="10;20;10" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.35;0;0.35" dur="2.5s" repeatCount="indefinite" />
  </circle>

  <!-- Brand Text -->
  <text x="120" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="38" font-weight="800" letter-spacing="2" fill="#F8FAFC">
    GRIND</text>
  <text x="335" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="38" font-weight="800" letter-spacing="2" fill="url(#mapTextGrad)">
    MAP</text>

  <!-- Tagline -->
  <text x="120" y="78" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="500" letter-spacing="1.5" fill="#64748B">
    YOUR PATH. YOUR GRIND.</text>

  <!-- Progress Accent Bar -->
  <rect x="120" y="88" width="100" height="4" rx="2" fill="#1E293B" />
  <rect x="120" y="88" width="72" height="4" rx="2" fill="url(#brandGrad)" />
</svg>