<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded card -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" stroke="#1F2937" stroke-width="2"/>

  <!-- Connected path -->
  <line x1="28" y1="68" x2="38" y2="68" stroke="#4C1D95" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="68" x2="52" y2="48" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="48" x2="72" y2="32" stroke="#22D3EE" stroke-width="3" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="28" cy="68" r="5" fill="#6D28D9"/>
  <circle cx="52" cy="48" r="6" fill="#8B5CF6"/>
  <circle cx="72" cy="32" r="7" fill="url(#iconGrad)"/>
  <circle cx="72" cy="32" r="2.5" fill="#FFFFFF"/>
</svg>