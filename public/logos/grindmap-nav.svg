<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 50" width="180" height="35">
  <defs>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <filter id="smallGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <circle cx="8" cy="25" r="3.5" fill="#5B21B6" opacity="0.6"/>
  <circle cx="18" cy="25" r="4" fill="#7C3AED" opacity="0.75"/>
  <circle cx="32" cy="15" r="4.5" fill="#8B5CF6" opacity="0.85"/>
  <circle cx="48" cy="30" r="5" fill="#22D3EE" filter="url(#smallGlow)" />
  <circle cx="48" cy="30" r="2" fill="#FFFFFF"/>

  <!-- Text -->
  <text x="62" y="32" font-family="Inter, -apple-system, sans-serif"
        font-size="22" font-weight="800" letter-spacing="1" fill="#F8FAFC">GRIND</text>
  <text x="148" y="32" font-family="Inter, -apple-system, sans-serif"
        font-size="22" font-weight="800" letter-spacing="1" fill="url(#navGrad)">MAP</text>
</svg>