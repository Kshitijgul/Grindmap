<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="barPurple" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#6D28D9"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#22C55E"/></linearGradient>
    <linearGradient id="barCoral" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#EA580C"/><stop offset="100%" stop-color="#FB923C"/></linearGradient>
  </defs>

  <!-- Background: Clean White with subtle border -->
  <rect width="32" height="32" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- Bold Base Ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#6366F1" stroke-width="3.5" opacity="0.4"/>
  <!-- Gold Progress Arc -->
  <path d="M4 16 A12 12 0 0 1 28 16" fill="none" stroke="#FFB900" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bold Upward Arrow -->
  <path d="M28 16 L28 5" stroke="#6366F1" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="28,2 25,6 31,6" fill="#6366F1"/>
  <!-- Growth Bars -->
  <rect x="7" y="19" width="5" height="7" rx="2" fill="url(#barPurple)"/>
  <rect x="13" y="14" width="5" height="12" rx="2" fill="url(#barCoral)"/>
  <rect x="19" y="9" width="5" height="17" rx="2" fill="url(#barGreen)"/>
</svg>