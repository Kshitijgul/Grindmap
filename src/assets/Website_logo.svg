<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 130" width="460" height="130">
  <defs>
    <linearGradient id="g5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="g5card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="shadow5a">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow5b">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6366F1" flood-opacity="0.2"/>
    </filter>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow5soft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- NO white background -->

  <!-- Shadow card behind -->
  <rect x="18" y="22" width="100" height="95" rx="18" fill="#312E81" opacity="0.08" transform="translate(4, 4)"/>

  <!-- Main card -->
  <g filter="url(#shadow5a)">
    <rect x="14" y="12" width="100" height="106" rx="18" fill="url(#g5card)"/>
  </g>

  <!-- Inner glow -->
  <circle cx="64" cy="55" r="35" fill="#818CF8" filter="url(#glow5soft)" opacity="0.1"/>

  <g transform="translate(20, 16)">
    <!-- Ring track -->
    <circle cx="44" cy="50" r="32" fill="none" stroke="#312E81" stroke-width="6" opacity="0.5"/>

    <!-- Progress arc -->
    <path d="M44 18 A32 32 0 1 1 17 72" fill="none" stroke="url(#g5a)" stroke-width="6.5" stroke-linecap="round" filter="url(#glow5)">
      <animate attributeName="stroke-dasharray" from="0 250" to="160 250" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
    </path>

    <!-- End dot -->
    <circle cx="17" cy="72" r="4.5" fill="#EC4899" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.4s" fill="freeze"/>
    </circle>
    <circle cx="17" cy="72" r="4.5" fill="#EC4899" opacity="0">
      <animate attributeName="r" values="4.5;10;4.5" dur="2.5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Start dot -->
    <circle cx="44" cy="18" r="3.5" fill="#818CF8" opacity="0.8"/>

    <!-- Bars inside circle -->
    <rect x="30" y="52" width="6" height="16" rx="3" fill="#818CF8" opacity="0.6"/>
    <rect x="41" y="44" width="6" height="24" rx="3" fill="#818CF8"/>
    <rect x="52" y="36" width="6" height="32" rx="3" fill="url(#grad1)"/>

    <!-- Percentage -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
      <text x="64" y="22" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#A78BFA" opacity="0.8">78%</text>
    </g>
  </g>

  <!-- Text Section — SAME AS ORIGINAL -->
  <g transform="translate(130, 15)" filter="url(#shadow5b)">
    <text x="0" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="900" fill="#111827">
      GRIND<tspan fill="#6B7280">MAP</tspan>
    </text>

    <!-- Gradient underline with segments -->
    <rect x="0" y="63" width="0" height="4" rx="2" fill="#6366F1">
      <animate attributeName="width" from="0" to="40" dur="0.4s" begin="0.4s" fill="freeze"/>
    </rect>
    <rect x="44" y="63" width="0" height="4" rx="2" fill="#8B5CF6">
      <animate attributeName="width" from="0" to="35" dur="0.35s" begin="0.6s" fill="freeze"/>
    </rect>
    <rect x="83" y="63" width="0" height="4" rx="2" fill="#EC4899">
      <animate attributeName="width" from="0" to="30" dur="0.3s" begin="0.8s" fill="freeze"/>
    </rect>
  </g>

  <!-- Feature cards row -->
  <g transform="translate(137, 90)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>

    <rect x="0" y="0" width="75" height="28" rx="8" fill="white" stroke="#E5E7EB" stroke-width="0.8"/>
    <circle cx="15" cy="14" r="5" fill="#EEF2FF"/>
    <text x="15" y="17" text-anchor="middle" font-size="7">📋</text>
    <text x="26" y="12" font-family="'Inter', sans-serif" font-size="7" font-weight="700" fill="#1E1B4B">Tasks</text>
    <text x="26" y="22" font-family="'Inter', sans-serif" font-size="6" fill="#9CA3AF">Schedule</text>

    <rect x="82" y="0" width="75" height="28" rx="8" fill="white" stroke="#E5E7EB" stroke-width="0.8"/>
    <circle cx="97" cy="14" r="5" fill="#F5F3FF"/>
    <text x="97" y="17" text-anchor="middle" font-size="7">🎯</text>
    <text x="108" y="12" font-family="'Inter', sans-serif" font-size="7" font-weight="700" fill="#1E1B4B">Focus</text>
    <text x="108" y="22" font-family="'Inter', sans-serif" font-size="6" fill="#9CA3AF">Sessions</text>

    <rect x="164" y="0" width="75" height="28" rx="8" fill="white" stroke="#E5E7EB" stroke-width="0.8"/>
    <circle cx="179" cy="14" r="5" fill="#FDF2F8"/>
    <text x="179" y="17" text-anchor="middle" font-size="7">🏆</text>
    <text x="190" y="12" font-family="'Inter', sans-serif" font-size="7" font-weight="700" fill="#1E1B4B">Goals</text>
    <text x="190" y="22" font-family="'Inter', sans-serif" font-size="6" fill="#9CA3AF">Tracking</text>
  </g>
</svg>